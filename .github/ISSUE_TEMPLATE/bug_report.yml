name: 🐛 Bug Report
description: Report a bug or unexpected behavior in OpenACP
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix it quickly.

  - type: input
    id: version
    attributes:
      label: OpenACP Version
      description: Run `openacp --version` to get this
      placeholder: "e.g. 2026.331.1"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Messaging Platform
      description: "Which platform were you using? Note: Discord/Slack adapter issues may belong in their own repos."
      options:
        - Telegram
        - Discord
        - Slack
        - REST API
        - CLI
        - Other
    validations:
      required: true

  - type: input
    id: agent
    attributes:
      label: AI Agent
      description: "Which agent were you using? Run `openacp agents list` for exact name."
      placeholder: "e.g. Claude Code, Codex, Gemini CLI, N/A"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what happened
      placeholder: Tell us what went wrong
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior
      placeholder: |
        1. Start OpenACP with `openacp start`
        2. Send message in Telegram "..."
        3. Click approve on permission prompt
        4. See error "..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste relevant logs. Run `openacp doctor` for diagnostics.
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant parts of your `~/.openacp/config.json` (remove secrets!)
      render: json

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 15.3, Ubuntu 24.04, Windows 11"

  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: "e.g. 20.11.0"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, screen recordings, or any other context
