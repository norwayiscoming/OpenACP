name: ✨ Feature Request
description: Suggest a new feature or enhancement for OpenACP
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make OpenACP better? We'd love to hear it!

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of OpenACP does this relate to?
      options:
        - Telegram adapter
        - Discord adapter
        - Slack adapter
        - New platform adapter
        - CLI
        - REST API
        - Session management
        - Agent support
        - Voice features
        - Tunnel / Port forwarding
        - Plugin system
        - Configuration
        - Security
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? Why do you need it?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
      placeholder: Describe the ideal behavior, CLI commands, UI flow, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've considered?

  - type: dropdown
    id: willing
    attributes:
      label: Would you be willing to contribute this?
      options:
        - "Yes, I'd like to submit a PR"
        - "Yes, with some guidance"
        - "No, but I'd love to see it built"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Mockups, screenshots, links to related issues or discussions
