name: Telegram Notifications

on:
  push:
    branches: ["**"]
  pull_request_target:
    types: [opened, closed, reopened]
  release:
    types: [published]
  workflow_run:
    workflows: ["Publish to npm"]
    types: [completed]

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}

jobs:
  notify-push:
    name: Push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Build and send notification
        env:
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
          BRANCH: ${{ github.ref_name }}
          COMPARE_URL: ${{ github.event.compare }}
        run: |
          COMMITS=""
          for row in $(echo "$COMMITS_JSON" | jq -r '.[] | @base64'); do
            MSG=$(echo "$row" | base64 -d | jq -r '.message' | head -1)
            AUTHOR=$(echo "$row" | base64 -d | jq -r '.author.username')
            SHORT=$(echo "$row" | base64 -d | jq -r '.id' | cut -c1-7)
            COMMITS="${COMMITS}• <code>${SHORT}</code> ${MSG} — ${AUTHOR}"$'\n'
          done

          [ -z "$COMMITS" ] && exit 0

          TEXT="🔀 <b>Push to ${BRANCH}</b>

          ${COMMITS}
          <a href=\"${COMPARE_URL}\">View changes</a>"

          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d message_thread_id="${TELEGRAM_TOPIC_ID}" \
            -d parse_mode=HTML \
            -d disable_web_page_preview=true \
            --data-urlencode "text=${TEXT}"

  notify-pr:
    name: Pull Request
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUM: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
        run: |
          if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            EMOJI="✅"; STATUS="merged"
          elif [ "$ACTION" = "closed" ]; then
            EMOJI="❌"; STATUS="closed"
          elif [ "$ACTION" = "reopened" ]; then
            EMOJI="🔄"; STATUS="reopened"
          else
            EMOJI="📬"; STATUS="opened"
          fi

          TEXT="${EMOJI} <b>PR #${PR_NUM} ${STATUS}</b>

          <a href=\"${PR_URL}\">${PR_TITLE}</a>
          by ${AUTHOR}"

          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d message_thread_id="${TELEGRAM_TOPIC_ID}" \
            -d parse_mode=HTML \
            -d disable_web_page_preview=true \
            --data-urlencode "text=${TEXT}"

  notify-release:
    name: Release published
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        env:
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          TEXT="🚀 <b>Release ${TAG}</b>

          ${RELEASE_NAME}

          <a href=\"${RELEASE_URL}\">View release</a>"

          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d message_thread_id="${TELEGRAM_TOPIC_ID}" \
            -d parse_mode=HTML \
            -d disable_web_page_preview=true \
            --data-urlencode "text=${TEXT}"

  notify-ci-failure:
    name: CI failure
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        env:
          WORKFLOW: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          AUTHOR: ${{ github.event.workflow_run.actor.login }}
        run: |
          TEXT="🔴 <b>CI Failed: ${WORKFLOW}</b>

          Branch: <code>${BRANCH}</code>
          Triggered by: ${AUTHOR}

          <a href=\"${RUN_URL}\">View run</a>"

          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d message_thread_id="${TELEGRAM_TOPIC_ID}" \
            -d parse_mode=HTML \
            -d disable_web_page_preview=true \
            --data-urlencode "text=${TEXT}"
